---
version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: weekly
    day: monday
    time: '08:00'
    timezone: Europe/Madrid
  open-pull-requests-limit: 10
  groups:
    dev-dependencies:
      dependency-type: development
      update-types:
      - minor
      - patch
    production-dependencies:
      dependency-type: production
      update-types:
      - minor
      - patch
  ignore:
  - dependency-name: "*"
    update-types:
    - version-update:semver-major
  assignees:
  - javiyt
  reviewers:
  - javiyt
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 5
  assignees:
  - javiyt
  reviewers:
  - javiyt
